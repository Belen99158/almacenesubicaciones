<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin — Registro de Visitas · Almacenes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#EEF2FA;
  --surface:#fff;
  --surface-alt:#E7EDFB;
  --ink:#13203D;
  --ink-soft:#4B5A78;
  --ink-faint:#8893A8;
  --border:rgba(19,32,61,.12);
  --border-strong:rgba(19,32,61,.25);

  --blue:#1857D6;
  --blue-dark:#0E3C9C;
  --blue-deep:#0A2A6E;
  --blue-soft:#E2EBFD;

  --red:#E0312B;
  --red-dark:#A91F1B;
  --red-soft:#FBE5E4;

  --green:#0E9460;
  --green-dark:#0A6E47;
  --green-soft:#E1F6EC;

  --orange:#D9740A;
  --orange-dark:#9C5404;
  --orange-soft:#FCEEDD;

  --purple:#7C3AED;
  --purple-dark:#5B25B8;
  --purple-soft:#F0E9FD;

  --teal:#0E96A0;
  --teal-dark:#0A6E76;
  --teal-soft:#DEF5F6;

  --radius-lg:16px;
  --radius:12px;
  --radius-sm:9px;
  --shadow-card:0 1px 3px rgba(13,30,70,.08);
  --shadow-pop:0 10px 28px rgba(10,30,80,.16);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
.app { max-width: 1180px; margin: 0 auto; min-height: 100vh; padding-bottom: 2rem; }

/* ---- Header ---- */
.header { background: linear-gradient(135deg, var(--blue) 0%, var(--blue-deep) 100%); padding: 1.4rem 1.25rem; position: relative; overflow: hidden; }
.header::after { content:''; position:absolute; right:-40px; top:-50px; width:170px; height:170px; border-radius:50%; background: var(--red); opacity:.18; }
.header-row { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1; max-width: 1180px; margin: 0 auto; }
.header-left { display:flex; align-items:center; gap: .75rem; }
.header-badge { width:38px; height:38px; border-radius:11px; background: rgba(255,255,255,.16); display:flex; align-items:center; justify-content:center; color:#fff; font-size:19px; flex-shrink:0; }
.header h1 { font-size: 17px; font-weight: 700; color:#fff; letter-spacing:-.2px; }
.header p { font-size: 11.5px; color: rgba(255,255,255,.78); margin-top: 1px; }
.header-actions { display:flex; gap:8px; }
.btn-pill { padding: 8px 14px; border-radius: 999px; font-size: 12.5px; font-weight: 600; cursor:pointer; display:flex; align-items:center; gap:6px; text-decoration:none; border:none; transition: all .15s; }
.btn-pill.ghost { background: rgba(255,255,255,.14); color:#fff; }
.btn-pill.ghost:hover { background: rgba(255,255,255,.24); }
.btn-pill.solid-red { background: var(--red); color:#fff; box-shadow: 0 4px 10px rgba(224,49,43,.35); }
.btn-pill.solid-red:hover { transform: translateY(-1px); }

.content { padding: 1.25rem; }

/* ---- Lock screen ---- */
.lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 1.5rem; gap: 1rem; text-align: center; }
.lock-icon-wrap { width:72px; height:72px; border-radius:20px; background: var(--blue-soft); display:flex; align-items:center; justify-content:center; }
.lock-icon-wrap i { font-size: 32px; color: var(--blue); }
.lock-screen h3 { font-size: 17px; font-weight: 700; }
.lock-screen p { font-size: 13px; color: var(--ink-soft); }
.pin-wrap { display: flex; gap: 8px; width: 100%; max-width: 280px; }
.pin-wrap input { flex: 1; padding: 11px 12px; border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 18px; text-align: center; letter-spacing: 6px; }
.pin-wrap input:focus { outline:none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
.pin-wrap input.pin-err { border-color: var(--red); background: var(--red-soft); }
.pin-wrap button { padding: 11px 18px; border: none; border-radius: var(--radius-sm); background: var(--blue); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; }
.pin-wrap button:hover { background: var(--blue-dark); }
#pin-error { color: var(--red-dark); font-size: 12px; display: none; font-weight: 500; }

/* ---- Cards ---- */
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.1rem; box-shadow: var(--shadow-card); }
.card-title { font-size: 12.5px; font-weight: 700; color: var(--blue-dark); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: .4px; }

/* ---- Filters ---- */
.filters-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.filter-field label { font-size: 11px; color: var(--ink-soft); margin-bottom: 4px; display: block; font-weight: 600; }
.filter-field select, .filter-field input { width: 100%; padding: 9px 10px; border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 13px; background: var(--surface); color: var(--ink); }
.filter-field select:focus, .filter-field input:focus { outline:none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
.filter-actions { display: flex; gap: 8px; grid-column: 1 / -1; margin-top: 2px; }
.btn-filter { flex: 1; padding: 10px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .15s; border: none; white-space: nowrap; }
.btn-filter.blue { background: var(--blue); color: #fff; }
.btn-filter.blue:hover { background: var(--blue-dark); }
.btn-filter.red { background: var(--red); color: #fff; }
.btn-filter.red:hover { background: var(--red-dark); }

/* ---- KPI stats ---- */
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.1rem; }
.stat { background: var(--surface); border-radius: var(--radius); padding: .9rem 1.1rem; border-left: 4px solid var(--blue); box-shadow: var(--shadow-card); }
.stat .val { font-size: 23px; font-weight: 800; line-height: 1.1; color: var(--ink); }
.stat .lbl { font-size: 10.5px; color: var(--ink-soft); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
.stat.accent-blue { border-left-color: var(--blue); }
.stat.accent-red  { border-left-color: var(--red); }
.stat.accent-green{ border-left-color: var(--green); }
.stat.accent-teal { border-left-color: var(--teal); }

/* ---- Data table ---- */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 880px; }
table.data-table thead th { background: var(--blue-deep); color: #fff; text-align: left; padding: 11px 14px; font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; position: sticky; top: 0; white-space: nowrap; }
table.data-table tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--ink); vertical-align: top; }
table.data-table tbody tr:nth-child(even) { background: var(--surface-alt); }
table.data-table tbody tr:hover { background: var(--blue-soft); }
.td-asesor { font-weight: 700; white-space: nowrap; }
.td-cliente { max-width: 200px; }
.td-motivos { display: flex; flex-wrap: wrap; gap: 4px; }
.td-km { white-space: nowrap; font-variant-numeric: tabular-nums; }
.td-fecha { white-space: nowrap; color: var(--ink-soft); }
.td-actions { display: flex; gap: 6px; white-space: nowrap; }

.badge { padding: 2px 9px; border-radius: 999px; font-size: 10.5px; font-weight: 700; white-space: nowrap; }
.badge-prospeccion { background: var(--teal-soft); color: var(--teal-dark); }
.badge-reclutamiento { background: var(--purple-soft); color: var(--purple-dark); }
.badge-entrega_solicitud_credito { background: var(--blue-soft); color: var(--blue-dark); }
.badge-recepcion_informacion_completa { background: var(--green-soft); color: var(--green-dark); }
.badge-pedidos { background: var(--orange-soft); color: var(--orange-dark); }
.badge-cobros { background: var(--red-soft); color: var(--red-dark); }
/* motivo de inicio de actividades, por si aparece en la tabla */
.badge-inicio_actividades { background: var(--green-soft); color: var(--green-dark); }

.icon-btn { padding: 7px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--ink-soft); cursor: pointer; display: flex; align-items: center; font-size: 15px; transition: all .15s; }
.icon-btn.map:hover { background: var(--green-soft); color: var(--green-dark); border-color: var(--green); }
.icon-btn.del:hover { background: var(--red-soft); color: var(--red-dark); border-color: var(--red); }

.empty { text-align: center; padding: 3.5rem 1rem; color: var(--ink-faint); }
.empty i { font-size: 42px; margin-bottom: .75rem; display: block; color: var(--border-strong); }
.loading { text-align: center; padding: 2.5rem; color: var(--ink-soft); font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.loading i { animation: spin .8s linear infinite; display: inline-block; color: var(--blue); }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--green-dark); color: #fff; padding: 11px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity .3s; white-space: nowrap; pointer-events: none; box-shadow: var(--shadow-pop); }
.toast.show { opacity: 1; }
.toast.err { background: var(--red-dark); }

@media (min-width: 760px) {
  .content { padding: 1.5rem 1.75rem; }
  .filters-grid { grid-template-columns: repeat(4, 1fr) auto auto; align-items: end; }
  .filter-actions { display: contents; }
  .btn-filter { flex: none; padding: 9px 18px; }
  .stats-row { grid-template-columns: repeat(6, 1fr); }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-row">
      <div class="header-left">
        <div class="header-badge"><i class="ti ti-layout-dashboard"></i></div>
        <div>
          <h1>Panel administrador</h1>
          <p>Dashboard y registros de visitas</p>
        </div>
      </div>
      <div class="header-actions">
        <a class="btn-pill ghost" href="index.html"><i class="ti ti-arrow-left" style="font-size:14px"></i> Registro</a>
        <button class="btn-pill solid-red" id="btn-logout" onclick="lockAdmin()" style="display:none">
          <i class="ti ti-lock" style="font-size:14px"></i> Salir
        </button>
      </div>
    </div>
  </div>

  <div class="content">
    <div id="lock-wrap">
      <div class="lock-screen">
        <div class="lock-icon-wrap"><i class="ti ti-lock"></i></div>
        <h3>Acceso administrador</h3>
        <p>Ingresa el código de 4 dígitos para continuar</p>
        <div class="pin-wrap">
          <input type="password" id="pin-input" placeholder="••••" maxlength="4"
            onkeydown="if(event.key==='Enter') checkPin()">
          <button onclick="checkPin()">Entrar</button>
        </div>
        <p id="pin-error">Código incorrecto. Intenta de nuevo.</p>
      </div>
    </div>

    <div id="admin-panel" style="display:none">
      <div class="card">
        <div class="card-title"><i class="ti ti-filter" style="font-size:14px"></i> Filtros</div>
        <div class="filters-grid">
          <div class="filter-field"><label>Desde</label><input type="date" id="f-desde"></div>
          <div class="filter-field"><label>Hasta</label><input type="date" id="f-hasta"></div>
          <div class="filter-field">
            <label>Asesor</label>
            <select id="f-asesor">
              <option value="">Todos</option>
              <option>IVAN ENRIQUEZ</option>
              <option>ALAN JIMENEZ</option>
              <option>JOEL CORREA</option>
              <option>FRANCISCO AZA</option>
              <option>VENDEDOR PRENSA</option>
              <option>VENDEDOR TUMBACO</option>
            </select>
          </div>
          <div class="filter-field">
            <label>Motivo</label>
            <select id="f-motivo">
              <option value="">Todos</option>
              <option value="prospeccion">Prospección</option>
              <option value="reclutamiento">Reclutamiento</option>
              <option value="entrega_solicitud_credito">Entrega Solicitud Crédito</option>
              <option value="recepcion_informacion_completa">Recepción Info. Completa</option>
              <option value="pedidos">Pedidos</option>
              <option value="cobros">Cobros</option>
            </select>
          </div>
          <div class="filter-actions">
            <button class="btn-filter blue" onclick="renderAdmin()">
              <i class="ti ti-filter" style="font-size:14px"></i> Filtrar
            </button>
            <button class="btn-filter red" onclick="exportExcel()">
              <i class="ti ti-file-spreadsheet" style="font-size:14px"></i> Exportar Excel
            </button>
          </div>
        </div>
      </div>

      <div class="stats-row" id="stats-row"></div>

      <div class="card" style="padding:0; overflow:hidden;">
        <div style="padding:1.25rem 1.25rem 0;">
          <div class="card-title"><i class="ti ti-table" style="font-size:14px"></i> Registros</div>
        </div>
        <div style="padding: 0 1.25rem 1.25rem;">
          <div class="table-wrap" id="table-wrap">
            <div class="loading"><i class="ti ti-loader-2"></i> Cargando registros...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
//  URL DE TU GOOGLE APPS SCRIPT (proyecto ALMACENES) — termina en /exec
//  Debe ser LA MISMA que en index.html
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwsJuWah02iRO9ISDiaZxNk9pmOAOLM7dD1kkTbHbTR0xCT-I8urPTyQiFnKT7urHdJ/exec';
// ============================================================

const ADMIN_PIN = '2025';
let allRecords = [];

function api(params) {
  const url = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  return fetch(url, { redirect: 'follow' }).then(r => r.json());
}

/* ---- PIN ---- */
function checkPin() {
  const val = document.getElementById('pin-input').value.trim();
  if (val === ADMIN_PIN) {
    document.getElementById('lock-wrap').style.display   = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    document.getElementById('btn-logout').style.display  = 'flex';
    document.getElementById('pin-error').style.display   = 'none';
    document.getElementById('pin-input').value = '';
    renderAdmin();
  } else {
    const inp = document.getElementById('pin-input');
    inp.classList.add('pin-err');
    document.getElementById('pin-error').style.display = 'block';
    setTimeout(() => { inp.classList.remove('pin-err'); inp.value = ''; }, 1200);
  }
}

function lockAdmin() {
  document.getElementById('lock-wrap').style.display   = 'block';
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('btn-logout').style.display  = 'none';
}

/* ---- helper: lista de motivos de un registro ---- */
function motivosDe(r) {
  return (r.Motivo || '').toLowerCase().split(',').map(s => s.trim()).filter(Boolean);
}

function getFiltered() {
  const desde  = document.getElementById('f-desde').value;
  const hasta  = document.getElementById('f-hasta').value;
  const asesor = document.getElementById('f-asesor').value;
  const motivo = document.getElementById('f-motivo').value;
  return allRecords.filter(r => {
    if (desde  && r.Fecha < desde)   return false;
    if (hasta  && r.Fecha > hasta)   return false;
    if (asesor && r.Asesor !== asesor) return false;
    if (motivo && !motivosDe(r).includes(motivo)) return false;
    return true;
  });
}

async function renderAdmin() {
  document.getElementById('table-wrap').innerHTML =
    '<div class="loading"><i class="ti ti-loader-2"></i> Cargando registros...</div>';
  document.getElementById('stats-row').innerHTML = '';

  try {
    const data = await api({ action: 'getAll' });
    allRecords = data.records || [];
  } catch(e) {
    document.getElementById('table-wrap').innerHTML =
      '<div class="empty"><i class="ti ti-wifi-off"></i><p>Error al cargar. Verifica conexión.</p></div>';
    return;
  }

  const fr            = getFiltered();
  const cobros        = fr.filter(r => motivosDe(r).includes('cobros')).length;
  const pedidos       = fr.filter(r => motivosDe(r).includes('pedidos')).length;
  const prospecciones = fr.filter(r => motivosDe(r).includes('prospeccion')).length;
  const clientesUnicos = new Set(fr.map(r => (r.Cliente || '').trim().toLowerCase()).filter(Boolean)).size;
  const kmTotal        = fr.reduce((sum, r) => sum + (Number(r.Kilometraje) || 0), 0);

  document.getElementById('stats-row').innerHTML =
    '<div class="stat accent-blue"><div class="val">' + fr.length + '</div><div class="lbl">Registros</div></div>' +
    '<div class="stat accent-red"><div class="val">' + cobros + '</div><div class="lbl">Cobros</div></div>' +
    '<div class="stat accent-blue"><div class="val">' + pedidos + '</div><div class="lbl">Pedidos</div></div>' +
    '<div class="stat accent-teal"><div class="val">' + prospecciones + '</div><div class="lbl">Prospecciones</div></div>' +
    '<div class="stat accent-green"><div class="val">' + clientesUnicos + '</div><div class="lbl">Clientes únicos</div></div>' +
    '<div class="stat accent-blue"><div class="val">' + kmTotal.toLocaleString() + '</div><div class="lbl">Km recorridos</div></div>';

  const wrap = document.getElementById('table-wrap');
  if (!fr.length) {
    wrap.innerHTML = '<div class="empty"><i class="ti ti-clipboard-x"></i><p>No hay registros para estos filtros</p></div>';
    return;
  }

  const rows = fr.map(r => {
    const motivos = motivosDe(r);
    const badges = motivos.map(mo =>
      '<span class="badge badge-' + mo + '">' + mo.toUpperCase().replace(/_/g, ' ') + '</span>'
    ).join('');
    return '<tr>' +
      '<td class="td-asesor">' + (r.Asesor || '') + '</td>' +
      '<td class="td-cliente">' + (r.Cliente || '') + '</td>' +
      '<td class="td-fecha">' + (r.Fecha || '') + ' ' + (r.Hora || '') + '</td>' +
      '<td><div class="td-motivos">' + badges + '</div></td>' +
      '<td class="td-km">' + Number(r.Kilometraje || 0).toLocaleString() + ' km</td>' +
      '<td class="td-actions">' +
        '<button class="icon-btn map" onclick="openMap(\'' + r.Latitud + '\',\'' + r.Longitud + '\')" title="Ver en Maps">' +
          '<i class="ti ti-map-2"></i></button>' +
        '<button class="icon-btn del" onclick="deleteRecord(\'' + r.ID + '\')" title="Eliminar">' +
          '<i class="ti ti-trash"></i></button>' +
      '</td>' +
    '</tr>';
  }).join('');

  wrap.innerHTML =
    '<table class="data-table">' +
      '<thead><tr>' +
        '<th>Asesor</th><th>Cliente</th><th>Fecha / Hora</th><th>Motivo(s)</th><th>Km</th><th>Acciones</th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>';
}

function openMap(lat, lng) {
  window.open('https://maps.google.com/maps?q=' + lat + ',' + lng, '_blank');
}

async function deleteRecord(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  try {
    await api({ action: 'delete', id });
    showToast('Registro eliminado', false);
    renderAdmin();
  } catch(e) {
    showToast('Error al eliminar', true);
  }
}

function exportExcel() {
  const fr = getFiltered();
  if (!fr.length) { showToast('No hay registros para exportar', true); return; }
  const desde = document.getElementById('f-desde').value || 'inicio';
  const hasta  = document.getElementById('f-hasta').value  || 'hoy';
  const data = fr.map(r => ({
    'Asesor':           r.Asesor        || '',
    'Cliente':          r.Cliente       || '',
    'Fecha':            r.Fecha         || '',
    'Hora':             r.Hora          || '',
    'Motivo':           r.Motivo        || '',
    'Kilometraje':      r.Kilometraje   || '',
    'Latitud':          r.Latitud       || '',
    'Longitud':         r.Longitud      || '',
    'Precision GPS(m)': r.Precision_GPS || '',
    'Google Maps': 'https://maps.google.com/?q=' + r.Latitud + ',' + r.Longitud
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{wch:22},{wch:22},{wch:12},{wch:8},{wch:24},{wch:14},{wch:14},{wch:14},{wch:18},{wch:40}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Visitas');
  XLSX.writeFile(wb, 'Visitas_' + desde + '_a_' + hasta + '.xlsx');
  showToast('Excel descargado', false);
}

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '') + ' show';
  setTimeout(() => { t.className = 'toast' + (isErr ? ' err' : ''); }, 2800);
}
</script>
</body>
</html>
