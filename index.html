<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Visitas — Almacenes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#EEF2FA;
  --surface:#fff;
  --surface-alt:#E7EDFB;
  --ink:#13203D;
  --ink-soft:#4B5A78;
  --ink-faint:#8893A8;
  --border:rgba(19,32,61,.12);
  --border-strong:rgba(19,32,61,.25);

  --blue:#1857D6;
  --blue-dark:#0E3C9C;
  --blue-deep:#0A2A6E;
  --blue-soft:#E2EBFD;

  --red:#E0312B;
  --red-dark:#A91F1B;
  --red-soft:#FBE5E4;

  --green:#0E9460;
  --green-dark:#0A6E47;
  --green-soft:#E1F6EC;

  --orange:#D9740A;
  --orange-dark:#9C5404;
  --orange-soft:#FCEEDD;

  --purple:#7C3AED;
  --purple-dark:#5B25B8;
  --purple-soft:#F0E9FD;

  --teal:#0E96A0;
  --teal-dark:#0A6E76;
  --teal-soft:#DEF5F6;

  --radius-lg:16px;
  --radius:12px;
  --radius-sm:9px;
  --shadow-card:0 1px 3px rgba(13,30,70,.08);
  --shadow-pop:0 10px 28px rgba(10,30,80,.16);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* ---- Header con identidad azul/rojo ---- */
.header { background: linear-gradient(135deg, var(--blue) 0%, var(--blue-deep) 100%); padding: 1.6rem 1.25rem 1.9rem; position: relative; overflow: hidden; }
.header::after { content:''; position:absolute; right:-40px; top:-40px; width:160px; height:160px; border-radius:50%; background: var(--red); opacity:.18; }
.header-row { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1; }
.header-badge { width:38px; height:38px; border-radius:11px; background: rgba(255,255,255,.16); display:flex; align-items:center; justify-content:center; color:#fff; font-size:19px; flex-shrink:0; }
.header h1 { font-size: 18px; font-weight: 700; color:#fff; letter-spacing:-.2px; }
.header p { font-size: 12px; color: rgba(255,255,255,.78); margin-top: 2px; }
.header-text { flex:1; padding: 0 .75rem; }
.admin-link { width:38px; height:38px; border-radius:11px; background: var(--red); display:flex; align-items:center; justify-content:center; color:#fff; font-size:17px; flex-shrink:0; text-decoration:none; box-shadow: 0 4px 10px rgba(224,49,43,.35); transition: transform .15s; }
.admin-link:hover { transform: translateY(-1px); }

.content { flex: 1; padding: 1.1rem 1rem 1.5rem; margin-top: -1.1rem; position: relative; z-index: 2; }

.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow-card); }
.card-title { font-size: 12.5px; font-weight: 700; color: var(--blue-dark); margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: .4px; }

.field { margin-bottom: 1rem; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 5px; font-weight: 600; }
.field-hint { font-size: 11px; color: var(--ink-faint); font-weight: 400; margin-left: 4px; }
.field select, .field input { width: 100%; padding: 11px 12px; border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; background: var(--surface); color: var(--ink); transition: border-color .15s, box-shadow .15s; }
.field select:focus, .field input:focus { outline: none; box-shadow: 0 0 0 3px var(--blue-soft); border-color: var(--blue); }
.field input.field-err { border-color: var(--red); background: var(--red-soft); }

/* ---- Panel de visitas del día ---- */
.today-panel { display:none; background: linear-gradient(135deg, var(--blue-soft) 0%, #F2F6FE 100%); border:1.5px solid var(--blue); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 1rem; }
.today-panel.show { display:block; }
.today-head { display:flex; align-items:center; justify-content:space-between; }
.today-count { display:flex; align-items:baseline; gap:7px; }
.today-count b { font-size:26px; color: var(--blue-dark); line-height:1; }
.today-count span { font-size:12.5px; color: var(--ink-soft); font-weight:600; }
.today-refresh { border:none; background:none; color: var(--blue-dark); font-size:17px; cursor:pointer; padding:4px; border-radius:6px; }
.today-refresh:hover { background: rgba(24,87,214,.1); }
.today-list { margin-top:8px; display:none; }
.today-list.show { display:block; }
.today-item { font-size:12px; color: var(--ink-soft); padding:5px 0; border-top:1px dashed rgba(19,32,61,.15); display:flex; justify-content:space-between; gap:8px; }
.today-item .t-hora { color: var(--blue-dark); font-weight:700; flex-shrink:0; }
.today-toggle { border:none; background:none; color: var(--blue-dark); font-size:11.5px; font-weight:700; cursor:pointer; margin-top:6px; padding:0; }
.today-loading { font-size:12px; color: var(--ink-faint); }
.hist-btn { width:100%; margin-top:10px; padding:9px; border:1.5px solid var(--blue); border-radius:var(--radius-sm); background:var(--surface); color:var(--blue-dark); font-size:12.5px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
.hist-btn:hover { background: var(--blue-soft); }

/* ---- Inicio de actividades ---- */
.inicio-btn { width:100%; margin-top:10px; padding:12px; border:none; border-radius:var(--radius-sm); background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%); color:#fff; font-size:13.5px; font-weight:700; cursor:pointer; display:none; align-items:center; justify-content:center; gap:7px; box-shadow:0 4px 10px rgba(14,148,96,.3); }
.inicio-btn.show { display:flex; }
.inicio-btn:disabled { opacity:.6; cursor:wait; }
.inicio-ok { display:none; margin-top:10px; padding:9px 12px; border-radius:var(--radius-sm); background: var(--green-soft); color: var(--green-dark); font-size:12.5px; font-weight:700; align-items:center; gap:7px; }
.inicio-ok.show { display:flex; }

/* ---- Visitas pendientes de envío (modo sin señal) ---- */
.pend-banner { display:none; background: var(--orange-soft); border:1.5px solid var(--orange); border-radius: var(--radius); padding:10px 12px; margin-bottom:1rem; align-items:center; gap:10px; }
.pend-banner.show { display:flex; }
.pend-banner .p-icon { color: var(--orange-dark); font-size:20px; flex-shrink:0; }
.pend-banner .p-text { flex:1; font-size:12px; color: var(--orange-dark); font-weight:600; line-height:1.4; }
.pend-banner button { border:none; background: var(--orange); color:#fff; padding:8px 12px; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0; }

/* ---- Modal de historial ---- */
.hist-overlay { position:fixed; inset:0; background:rgba(10,20,50,.5); z-index:900; display:none; align-items:flex-end; justify-content:center; }
.hist-overlay.show { display:flex; }
.hist-sheet { background:var(--surface); border-radius:20px 20px 0 0; width:100%; max-width:520px; max-height:82vh; display:flex; flex-direction:column; box-shadow:var(--shadow-pop); }
.hist-head { padding:1rem 1.25rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.hist-head h3 { font-size:15px; color:var(--blue-dark); display:flex; align-items:center; gap:7px; }
.hist-close { border:none; background:var(--surface-alt); width:32px; height:32px; border-radius:9px; font-size:16px; color:var(--ink-soft); cursor:pointer; }
.hist-body { overflow-y:auto; padding: .75rem 1.25rem 1.5rem; }
.hist-date { font-size:11.5px; font-weight:800; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.5px; margin:14px 0 6px; display:flex; align-items:center; gap:8px; }
.hist-date b { color:var(--blue-dark); }
.hist-visit { background:var(--surface-alt); border-radius:var(--radius-sm); padding:9px 12px; margin-bottom:6px; }
.hist-visit .hv-top { display:flex; justify-content:space-between; gap:8px; }
.hist-visit .hv-cliente { font-size:13px; font-weight:700; color:var(--ink); }
.hist-visit .hv-hora { font-size:12px; font-weight:700; color:var(--blue-dark); flex-shrink:0; }
.hist-visit .hv-motivo { font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
.hist-empty { text-align:center; color:var(--ink-faint); font-size:13px; padding:2rem 1rem; }

/* ---- Buscador de clientes ---- */
.cliente-wrap { position:relative; }
.cliente-results { position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--surface); border:1.5px solid var(--border-strong); border-radius: var(--radius-sm); max-height:250px; overflow-y:auto; z-index:50; box-shadow: var(--shadow-pop); display:none; }
.cliente-results.show { display:block; }
.cli-item { padding:10px 12px; cursor:pointer; border-bottom:1px solid var(--border); }
.cli-item:last-child { border-bottom:none; }
.cli-item:hover, .cli-item.active { background: var(--blue-soft); }
.cli-name { font-size:13px; font-weight:600; color:var(--ink); }
.cli-meta { font-size:11px; color: var(--ink-faint); margin-top:2px; display:flex; gap:8px; align-items:center; }
.cli-tag { display:inline-block; font-size:10px; font-weight:700; padding:1px 7px; border-radius:20px; }
.cli-tag.inactivo { background: var(--red-soft); color: var(--red-dark); }
.cli-tag.visitado { background: var(--green-soft); color: var(--green-dark); }
.cli-empty { padding:12px; font-size:12.5px; color: var(--ink-faint); }
.cli-selected { display:none; margin-top:7px; font-size:12px; color: var(--green-dark); font-weight:600; align-items:center; gap:5px; }
.cli-selected.show { display:flex; }
.cli-selected.prospecto { color: var(--teal-dark); }
.base-status { font-size:11px; margin-top:6px; display:flex; align-items:center; gap:5px; color: var(--ink-faint); }
.base-status.err { color: var(--red-dark); font-weight:600; }
#base-file-btn { display:none; margin-top:8px; }
.file-pick-btn { width:100%; padding:10px; border:1.5px dashed var(--border-strong); border-radius: var(--radius-sm); background:var(--surface-alt); color: var(--ink-soft); font-size:12.5px; font-weight:600; cursor:pointer; }

.motivo-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.motivo-btn { padding: 12px 8px; border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--surface); color: var(--ink-soft); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .15s; }
.motivo-btn:hover { border-color: var(--blue); color: var(--blue-dark); }
.motivo-btn.sel-prospeccion { background: var(--teal);   border-color: var(--teal);   color: #fff; box-shadow: 0 4px 10px rgba(14,150,160,.3); }
.motivo-btn.sel-reclutamiento { background: var(--purple); border-color: var(--purple); color: #fff; box-shadow: 0 4px 10px rgba(124,58,237,.3); }
.motivo-btn.sel-entrega     { background: var(--blue);   border-color: var(--blue);   color: #fff; box-shadow: 0 4px 10px rgba(24,87,214,.32); }
.motivo-btn.sel-recepcion   { background: var(--green);  border-color: var(--green);  color: #fff; box-shadow: 0 4px 10px rgba(14,148,96,.3); }
.motivo-btn.sel-pedidos     { background: var(--orange); border-color: var(--orange); color: #fff; box-shadow: 0 4px 10px rgba(217,116,10,.3); }
.motivo-btn.sel-cobros      { background: var(--red);    border-color: var(--red);    color: #fff; box-shadow: 0 4px 10px rgba(224,49,43,.32); }

.loc-btn { width: 100%; padding: 12px 12px; border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm); background: var(--surface); color: var(--ink-soft); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all .15s; }
.loc-btn:hover:not(:disabled) { border-color: var(--blue); }
.loc-btn.got { border-color: var(--green); color: var(--green-dark); background: var(--green-soft); }
.loc-btn.err { border-color: var(--red); color: var(--red-dark); background: var(--red-soft); }
.loc-text { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
#map-container { border-radius: var(--radius-sm); overflow: hidden; height: 160px; display: none; border: 1.5px solid var(--border); margin-top: 10px; }
#map-frame { width: 100%; height: 100%; border: none; }

.submit-wrap { position: sticky; bottom: 0; padding-top: .25rem; }
.submit-btn { width: 100%; padding: 15px; border: none; border-radius: var(--radius-sm); background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .15s; box-shadow: var(--shadow-pop); }
.submit-btn:disabled { opacity: .4; cursor: not-allowed; box-shadow:none; }
.submit-btn:not(:disabled):hover { transform: translateY(-1px); }
.submit-hint { font-size: 11.5px; color: var(--red-dark); text-align: center; margin-top: 8px; min-height: 14px; font-weight: 500; }

/* ---- Aviso de duplicado ---- */
.dup-overlay { position:fixed; inset:0; background:rgba(10,20,50,.5); z-index:999; display:none; align-items:center; justify-content:center; padding:1.5rem; }
.dup-overlay.show { display:flex; }
.dup-box { background:var(--surface); border-radius:var(--radius-lg); padding:1.4rem; max-width:380px; width:100%; box-shadow:var(--shadow-pop); }
.dup-box h3 { font-size:15px; color:var(--red-dark); display:flex; align-items:center; gap:7px; margin-bottom:8px; }
.dup-box p { font-size:13px; color:var(--ink-soft); line-height:1.5; margin-bottom:14px; }
.dup-actions { display:flex; gap:8px; }
.dup-actions button { flex:1; padding:11px; border-radius:var(--radius-sm); font-size:13px; font-weight:700; cursor:pointer; }
.dup-cancel { border:1.5px solid var(--border-strong); background:var(--surface); color:var(--ink-soft); }
.dup-confirm { border:none; background:var(--red); color:#fff; }

.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--green-dark); color: #fff; padding: 11px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity .3s; white-space: nowrap; pointer-events: none; box-shadow: var(--shadow-pop); }
.toast.show { opacity: 1; }
.toast.err { background: var(--red-dark); }

@media (min-width: 760px) {
  .app { max-width: 560px; }
  .header { padding: 2.1rem 1.75rem 2.4rem; }
  .header h1 { font-size: 21px; }
  .content { padding: 1.1rem 1.4rem 2rem; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-row">
      <div class="header-badge"><i class="ti ti-map-pin"></i></div>
      <div class="header-text">
        <h1>Registro de visitas</h1>
        <p>Control de asesores · Almacenes</p>
      </div>
      <a class="admin-link" href="admin.html" title="Panel administrador">
        <i class="ti ti-shield-lock"></i>
      </a>
    </div>
  </div>

  <div class="content">
    <!-- Visitas guardadas sin señal, esperando envío -->
    <div class="pend-banner" id="pend-banner">
      <i class="ti ti-cloud-upload p-icon"></i>
      <div class="p-text" id="pend-text"></div>
      <button onclick="enviarPendientes(true)">Reintentar</button>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-user-circle" style="font-size:16px"></i> Datos del asesor</div>
      <div class="field">
        <label>Asesor</label>
        <select id="asesor" onchange="onAsesorChange()">
          <option value="">— Selecciona tu nombre —</option>
          <option>IVAN ENRIQUEZ</option>
          <option>ALAN JIMENEZ</option>
          <option>JOEL CORREA</option>
          <option>FRANCISCO AZA</option>
          <option>VENDEDOR PRENSA</option>
          <option>VENDEDOR TUMBACO</option>
        </select>
      </div>

      <!-- Panel: visitas de hoy -->
      <div class="today-panel" id="today-panel">
        <div class="today-head">
          <div class="today-count">
            <b id="today-count">–</b>
            <span id="today-label">visitas hoy</span>
          </div>
          <button class="today-refresh" onclick="loadToday()" title="Actualizar">
            <i class="ti ti-refresh"></i>
          </button>
        </div>
        <div class="today-loading" id="today-loading" style="display:none">Consultando visitas de hoy...</div>
        <button class="inicio-btn" id="inicio-btn" onclick="iniciarActividades()">
          <i class="ti ti-player-play-filled"></i> Iniciar actividades
        </button>
        <div class="inicio-ok" id="inicio-ok"></div>
        <button class="today-toggle" id="today-toggle" onclick="toggleTodayList()" style="display:none">Ver clientes visitados hoy ▾</button>
        <div class="today-list" id="today-list"></div>
        <button class="hist-btn" onclick="abrirHistorial()">
          <i class="ti ti-history"></i> Ver mi historial
        </button>
      </div>

      <div class="field">
        <label>Cliente visitado <span class="field-hint">(busca en tu cartera o escribe un prospecto)</span></label>
        <div class="cliente-wrap">
          <input type="text" id="cliente" placeholder="Escribe para buscar tu cliente..." autocomplete="off"
                 oninput="onClienteInput()" onfocus="onClienteInput()">
          <div class="cliente-results" id="cliente-results"></div>
        </div>
        <div class="cli-selected" id="cli-selected"></div>
        <div class="base-status" id="base-status"><i class="ti ti-loader-2"></i> Cargando base de clientes...</div>
        <div id="base-file-btn">
          <button class="file-pick-btn" onclick="document.getElementById('base-file-input').click()">
            <i class="ti ti-file-spreadsheet"></i> Cargar archivo Excel de clientes
          </button>
          <input type="file" id="base-file-input" accept=".xlsx,.xls" style="display:none" onchange="loadBaseFromFile(this.files[0])">
        </div>
      </div>

      <div class="field">
        <label>Kilometraje del vehículo</label>
        <input type="number" id="km" placeholder="Ej: 45230" min="0" oninput="checkReady()">
      </div>
      <div class="field">
        <label>Motivo de visita <span class="field-hint">(puedes elegir varios)</span></label>
        <div class="motivo-group">
          <button class="motivo-btn" id="btn-prospeccion" onclick="selectMotivo('prospeccion')">
            <i class="ti ti-user-search" style="font-size:16px"></i> Prospección
          </button>
          <button class="motivo-btn" id="btn-reclutamiento" onclick="selectMotivo('reclutamiento')">
            <i class="ti ti-users-plus" style="font-size:16px"></i> Reclutamiento
          </button>
          <button class="motivo-btn" id="btn-entrega" onclick="selectMotivo('entrega_solicitud_credito')">
            <i class="ti ti-file-text" style="font-size:16px"></i> Entrega Solicitud Crédito
          </button>
          <button class="motivo-btn" id="btn-recepcion" onclick="selectMotivo('recepcion_informacion_completa')">
            <i class="ti ti-file-check" style="font-size:16px"></i> Recepción Info. Completa
          </button>
          <button class="motivo-btn" id="btn-pedidos" onclick="selectMotivo('pedidos')">
            <i class="ti ti-clipboard-list" style="font-size:16px"></i> Pedidos
          </button>
          <button class="motivo-btn" id="btn-cobros" onclick="selectMotivo('cobros')">
            <i class="ti ti-cash" style="font-size:16px"></i> Cobros
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><i class="ti ti-map-pin" style="font-size:16px"></i> Ubicación GPS</div>
      <button class="loc-btn" id="loc-btn" onclick="getLocation()">
        <i class="ti ti-current-location" style="font-size:18px" id="loc-icon"></i>
        <span class="loc-text" id="loc-text">Toca para obtener tu ubicación actual</span>
      </button>
      <div id="map-container">
        <iframe id="map-frame" allowfullscreen></iframe>
      </div>
    </div>

    <div class="submit-wrap">
      <button class="submit-btn" id="submit-btn" onclick="submitForm()" disabled>
        <i class="ti ti-circle-check" style="font-size:18px"></i> Registrar visita
      </button>
      <div class="submit-hint" id="submit-hint"></div>
    </div>
  </div>
</div>

<!-- Aviso de posible duplicado -->
<div class="dup-overlay" id="dup-overlay">
  <div class="dup-box">
    <h3><i class="ti ti-alert-triangle"></i> Visita ya registrada hoy</h3>
    <p id="dup-msg"></p>
    <div class="dup-actions">
      <button class="dup-cancel" onclick="closeDup(false)">Cancelar</button>
      <button class="dup-confirm" onclick="closeDup(true)">Registrar de todos modos</button>
    </div>
  </div>
</div>

<!-- Historial del asesor -->
<div class="hist-overlay" id="hist-overlay" onclick="if(event.target===this)cerrarHistorial()">
  <div class="hist-sheet">
    <div class="hist-head">
      <h3><i class="ti ti-history"></i> <span id="hist-title">Mi historial</span></h3>
      <button class="hist-close" onclick="cerrarHistorial()"><i class="ti ti-x"></i></button>
    </div>
    <div class="hist-body" id="hist-body">
      <div class="hist-empty">Cargando...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
//  URL DE TU GOOGLE APPS SCRIPT (proyecto ALMACENES) — termina en /exec
// ============================================================

// Mapa: nombre del asesor en el formulario → cómo aparece en la columna
// "ASESOR COMERCIAL" de la hoja. Se usa además una comparación tolerante
// (por palabras), así que funciona aunque en la hoja el nombre venga más
// largo o en distinto orden.
const ASESOR_VENDEDOR = {
  'IVAN ENRIQUEZ':    'IVAN ENRIQUEZ',
  'ALAN JIMENEZ':     'ALAN JIMENEZ',
  'JOEL CORREA':      'JOEL CORREA',
  'FRANCISCO AZA':    'FRANCISCO AZA',
  'VENDEDOR PRENSA':  'VENDEDOR PRENSA',
  'VENDEDOR TUMBACO': 'VENDEDOR TUMBACO'
};

let selectedMotivos = [];
let locationData    = null;
let baseClientes    = [];   // toda la base
let clientesAsesor  = [];   // cartera del asesor seleccionado
let visitasHoy      = [];   // visitas de hoy del asesor
let clienteElegido  = null; // cliente seleccionado de la lista (o null si es texto libre)
let dupConfirmado   = false;
let enviando        = false;

function api(params, timeoutMs) {
  const url = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeoutMs || 12000);
  return fetch(url, { redirect: 'follow', signal: ctrl.signal })
    .then(r => r.json())
    .finally(() => clearTimeout(t));
}

/* ============ COLA DE PENDIENTES (modo sin señal, estilo WhatsApp) ============
   Si al guardar no hay internet, la visita se guarda en el teléfono y se
   reenvía automáticamente cuando vuelve la señal. El servidor rechaza
   duplicados por id, así que reintentar nunca duplica registros. */
const PEND_KEY = 'visitas_pendientes_v1';
let enviandoPendientes = false;

function getPendientes() {
  try { return JSON.parse(localStorage.getItem(PEND_KEY)) || []; }
  catch (e) { return []; }
}
function setPendientes(arr) {
  try { localStorage.setItem(PEND_KEY, JSON.stringify(arr)); } catch (e) {}
  renderPendientes();
}
function renderPendientes() {
  const n = getPendientes().length;
  const banner = document.getElementById('pend-banner');
  if (!n) { banner.className = 'pend-banner'; return; }
  document.getElementById('pend-text').textContent =
    n === 1
      ? '1 visita guardada en tu teléfono, pendiente de envío. Se enviará sola cuando haya señal.'
      : n + ' visitas guardadas en tu teléfono, pendientes de envío. Se enviarán solas cuando haya señal.';
  banner.className = 'pend-banner show';
}

async function enviarPendientes(manual) {
  if (enviandoPendientes) return;
  let cola = getPendientes();
  if (!cola.length) return;
  enviandoPendientes = true;

  let enviadas = 0;
  const restantes = [];
  for (const payload of cola) {
    try {
      const res = await api(payload, 15000);
      if (res.ok) enviadas++;
      else restantes.push(payload);
    } catch (e) {
      restantes.push(payload); // sigue sin señal: se queda en la cola
    }
  }
  setPendientes(restantes);
  enviandoPendientes = false;

  if (enviadas) {
    showToast('✓ ' + enviadas + (enviadas === 1 ? ' visita pendiente enviada' : ' visitas pendientes enviadas'), false);
    loadToday();
  } else if (manual) {
    showToast('Aún sin conexión. Se reintentará automáticamente.', true);
  }
}

// Reintento automático: cuando vuelve el internet y cada 45 segundos
window.addEventListener('online', () => enviarPendientes(false));
setInterval(() => { if (navigator.onLine) enviarPendientes(false); }, 45000);

/* ================= BASE DE CLIENTES (Excel) ================= */
function normalizar(s) {
  return String(s || '').toUpperCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ').trim();
}

// Lee una columna por su nombre, tolerando espacios sobrantes y mayúsculas
// (los encabezados de la hoja traen espacios al final, p. ej. "PARROQUIA ").
function col(row, ...nombres) {
  const keys = Object.keys(row);
  for (const n of nombres) {
    const objetivo = normalizar(n);
    const k = keys.find(k => normalizar(k) === objetivo);
    if (k && String(row[k]).trim() !== '') return String(row[k]).trim();
  }
  return '';
}

function procesarFilas(rows) {
  const vistos = new Set();
  baseClientes = [];
  rows.forEach(r => {
    const nombre = col(r, 'RAZON SOCIAL', 'RAZÓN SOCIAL', 'Nombre Comercial');
    if (!nombre) return;
    const ruc      = col(r, 'RUC', 'identificacion');
    const ciudad   = col(r, 'PARROQUIA', 'DIRECCION', 'ciudad');
    const vendedor = col(r, 'ASESOR COMERCIAL', 'vendedor');
    // Quita duplicados de la base (mismo RUC o mismo nombre+asesor)
    const clave = ruc + '|' + normalizar(nombre) + '|' + normalizar(vendedor);
    if (vistos.has(clave)) return;
    vistos.add(clave);
    baseClientes.push({
      nombre,
      nombreNorm: normalizar(nombre),
      ciudad,
      vendedor: normalizar(vendedor),
      activo:   true   // la hoja no trae columna de estado → todos activos
    });
  });
}

function baseCargada(origen) {
  const st = document.getElementById('base-status');
  st.className = 'base-status';
  st.innerHTML = '<i class="ti ti-database"></i> Base cargada: ' + baseClientes.length + ' clientes' + (origen ? ' (' + origen + ')' : '');
  document.getElementById('base-file-btn').style.display = 'none';
  onAsesorChange(true);
}

async function cargarBase() {
  try {
    const resp = await fetch(BASE_CSV_URL);
    if (!resp.ok) throw new Error('no encontrado');
    const texto = await resp.text();
    const wb  = XLSX.read(texto, { type: 'string' });
    const ws  = wb.Sheets[wb.SheetNames[0]];
    procesarFilas(XLSX.utils.sheet_to_json(ws, { defval: '' }));
    baseCargada('Google Sheets');
  } catch (e) {
    const st = document.getElementById('base-status');
    st.className = 'base-status err';
    st.innerHTML = '<i class="ti ti-alert-circle"></i> No se pudo cargar la base desde Google Sheets. Puedes cargar un archivo manualmente:';
    document.getElementById('base-file-btn').style.display = 'block';
  }
}

function loadBaseFromFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      procesarFilas(XLSX.utils.sheet_to_json(ws, { defval: '' }));
      baseCargada('archivo local');
    } catch (err) {
      showToast('No se pudo leer el Excel', true);
    }
  };
  reader.readAsArrayBuffer(file);
}

/* Compara el "ASESOR COMERCIAL" de la hoja con el asesor seleccionado.
   Coincide si uno contiene al otro, o si todas las palabras del más corto
   están en el más largo (tolera nombres más largos o en otro orden). */
function vendedorCoincide(vendHoja, asesorSel) {
  if (!vendHoja || !asesorSel) return false;
  if (vendHoja === asesorSel) return true;
  if (vendHoja.includes(asesorSel) || asesorSel.includes(vendHoja)) return true;
  const a = vendHoja.split(' ').filter(Boolean);
  const b = asesorSel.split(' ').filter(Boolean);
  const corto = a.length <= b.length ? a : b;
  const largo = a.length <= b.length ? b : a;
  return corto.every(p => largo.includes(p));
}

/* ================= ASESOR + VISITAS DE HOY ================= */
function onAsesorChange(mantener) {
  const asesor = document.getElementById('asesor').value;
  if (!mantener) {
    document.getElementById('cliente').value = '';
    clienteElegido = null;
    document.getElementById('cli-selected').className = 'cli-selected';
  }
  const vendedor = ASESOR_VENDEDOR[asesor] ? normalizar(ASESOR_VENDEDOR[asesor]) : null;
  clientesAsesor = vendedor ? baseClientes.filter(c => vendedorCoincide(c.vendedor, vendedor)) : [];

  const panel = document.getElementById('today-panel');
  if (asesor) {
    panel.className = 'today-panel show';
    loadToday();
  } else {
    panel.className = 'today-panel';
    visitasHoy = [];
  }
  checkReady();
}

const INICIO_TAG = 'INICIO DE ACTIVIDADES';

// Candado local: recuerda en el teléfono que este asesor ya marcó inicio hoy
function hoyStr() { return new Date().toISOString().split('T')[0]; }
function inicioKey(asesor) { return 'inicio_' + normalizar(asesor) + '_' + hoyStr(); }
function inicioLocal(asesor) {
  try { return localStorage.getItem(inicioKey(asesor)); } catch (e) { return null; }
}
function marcarInicioLocal(asesor, hora) {
  try { localStorage.setItem(inicioKey(asesor), hora); } catch (e) {}
}

function mostrarInicioOk(hora, pendiente) {
  document.getElementById('inicio-btn').className = 'inicio-btn';
  const okIni = document.getElementById('inicio-ok');
  okIni.innerHTML = '<i class="ti ti-player-play-filled"></i> Actividades iniciadas' +
    (hora ? ' a las ' + escapeHtml(hora) : '') + (pendiente ? ' (pendiente de envío)' : '');
  okIni.className = 'inicio-ok show';
}

async function loadToday() {
  const asesor = document.getElementById('asesor').value;
  if (!asesor) return;
  const loading = document.getElementById('today-loading');
  loading.style.display = 'block';
  document.getElementById('today-count').textContent = '–';
  try {
    const res = await api({ action: 'hoy', asesor });

    // El Apps Script viejo responde {error:'Accion no valida'}: avisar al admin
    if (res && res.error) {
      document.getElementById('today-count').textContent = '!';
      document.getElementById('today-label').textContent =
        'servidor desactualizado: publica la NUEVA VERSIÓN del Code.gs';
      loading.style.display = 'none';
      return;
    }

    const todas = (res.visitas || []);
    // Separa la marca de inicio de las visitas reales
    const inicio = todas.find(v => normalizar(v.cliente) === INICIO_TAG);
    visitasHoy = todas.filter(v => normalizar(v.cliente) !== INICIO_TAG);

    document.getElementById('today-count').textContent = visitasHoy.length;
    document.getElementById('today-label').textContent =
      visitasHoy.length === 1 ? 'visita hoy' : 'visitas hoy';
    const tg = document.getElementById('today-toggle');
    tg.style.display = visitasHoy.length ? 'block' : 'none';
    renderTodayList();
    // La lista del día se muestra abierta para que vean sus registros
    if (visitasHoy.length) {
      document.getElementById('today-list').className = 'today-list show';
      tg.textContent = 'Ocultar lista ▴';
    }

    // Botón / estado de inicio de actividades (servidor O candado local)
    const local = inicioLocal(asesor);
    if (inicio) {
      mostrarInicioOk(inicio.hora, false);
      marcarInicioLocal(asesor, inicio.hora || '');
    } else if (local !== null) {
      mostrarInicioOk(local, true); // registrado sin señal, aún en cola
    } else {
      document.getElementById('inicio-btn').className = 'inicio-btn show';
      document.getElementById('inicio-ok').className = 'inicio-ok';
    }
  } catch (e) {
    document.getElementById('today-count').textContent = '?';
    document.getElementById('today-label').textContent = 'sin conexión al servidor';
    // Sin señal: usar el candado local para no permitir doble inicio
    const local = inicioLocal(asesor);
    if (local !== null) mostrarInicioOk(local, true);
    else document.getElementById('inicio-btn').className = 'inicio-btn show';
  }
  loading.style.display = 'none';
}

/* ================= INICIO DE ACTIVIDADES ================= */
function iniciarActividades() {
  const asesor = document.getElementById('asesor').value;
  if (!asesor) return;

  // Candado: solo UNA vez al día, aunque no haya señal
  if (inicioLocal(asesor) !== null) {
    mostrarInicioOk(inicioLocal(asesor), false);
    showToast('Ya registraste tu inicio de actividades hoy', true);
    return;
  }

  const btn = document.getElementById('inicio-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2"></i> Obteniendo ubicación...';

  const enviar = (lat, lng, acc) => {
    const now = new Date();
    const payload = {
      action: 'insert',
      id:     Date.now(),
      asesor,
      cliente: INICIO_TAG,
      km:      parseInt(document.getElementById('km').value) || 0,
      motivo:  'inicio_actividades',
      lat, lng, acc,
      fecha:   now.toISOString().split('T')[0],
      hora:    now.toTimeString().slice(0, 5)
    };
    btn.innerHTML = '<i class="ti ti-loader-2"></i> Registrando inicio...';
    api(payload).then(res => {
      if (!res.ok) throw new Error();
      marcarInicioLocal(asesor, payload.hora);
      showToast('✓ Inicio de actividades registrado', false);
      loadToday();
    }).catch(() => {
      // Sin señal: a la cola, candado local activado igualmente
      const cola = getPendientes(); cola.push(payload); setPendientes(cola);
      marcarInicioLocal(asesor, payload.hora);
      showToast('Sin señal: el inicio quedó guardado y se enviará solo', true);
      mostrarInicioOk(payload.hora, true);
    }).finally(() => {
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-player-play-filled"></i> Iniciar actividades';
    });
  };

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => enviar(pos.coords.latitude.toFixed(6), pos.coords.longitude.toFixed(6), Math.round(pos.coords.accuracy)),
      ()  => enviar('', '', ''), // sin GPS igual registra el inicio con la hora
      { enableHighAccuracy: true, timeout: 12000 }
    );
  } else {
    enviar('', '', '');
  }
}

/* ================= HISTORIAL DEL ASESOR ================= */
const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const DIAS_SEMANA = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

function fechaBonita(f) { // f = "2026-07-06"
  const [y, m, d] = String(f).split('-').map(Number);
  if (!y) return f;
  const dt = new Date(y, m - 1, d);
  const hoyStr = new Date().toISOString().split('T')[0];
  const ayer = new Date(); ayer.setDate(ayer.getDate() - 1);
  if (f === hoyStr) return 'Hoy';
  if (f === ayer.toISOString().split('T')[0]) return 'Ayer';
  return DIAS_SEMANA[dt.getDay()] + ' ' + d + ' ' + MESES[m - 1];
}

async function abrirHistorial() {
  const asesor = document.getElementById('asesor').value;
  if (!asesor) return;
  document.getElementById('hist-title').textContent = 'Historial · ' + asesor;
  const body = document.getElementById('hist-body');
  body.innerHTML = '<div class="hist-empty">Cargando tu historial...</div>';
  document.getElementById('hist-overlay').className = 'hist-overlay show';

  try {
    const res = await api({ action: 'historial', asesor, dias: 15 });
    if (res && res.error) {
      body.innerHTML = '<div class="hist-empty">⚠ El servidor no está actualizado.<br>Hay que pegar el nuevo Code.gs en Apps Script y publicar una <b>NUEVA VERSIÓN</b> de la implementación.</div>';
      return;
    }
    const visitas = res.visitas || [];
    if (!visitas.length) {
      body.innerHTML = '<div class="hist-empty">Aún no tienes visitas registradas en los últimos 15 días.</div>';
      return;
    }
    // Agrupar por fecha (ya vienen ordenadas de más reciente a más antigua)
    const grupos = {};
    visitas.forEach(v => { (grupos[v.fecha] = grupos[v.fecha] || []).push(v); });

    body.innerHTML = Object.keys(grupos).map(f => {
      const reales = grupos[f].filter(v => normalizar(v.cliente) !== INICIO_TAG);
      const items = grupos[f].map(v => {
        if (normalizar(v.cliente) === INICIO_TAG) {
          return '<div class="hist-visit" style="background:var(--green-soft)">' +
            '<div class="hv-top"><span class="hv-cliente" style="color:var(--green-dark)">▶ Inicio de actividades</span>' +
            '<span class="hv-hora">' + escapeHtml(v.hora || '') + '</span></div></div>';
        }
        return '<div class="hist-visit">' +
          '<div class="hv-top"><span class="hv-cliente">' + escapeHtml(v.cliente) + '</span>' +
          '<span class="hv-hora">' + escapeHtml(v.hora || '') + '</span></div>' +
          '<div class="hv-motivo">' + escapeHtml((v.motivo || '').replace(/_/g, ' ')) + '</div>' +
        '</div>';
      }).join('');
      return '<div class="hist-date"><b>' + fechaBonita(f) + '</b> · ' + reales.length +
             (reales.length === 1 ? ' visita' : ' visitas') + '</div>' + items;
    }).join('');
  } catch (e) {
    body.innerHTML = '<div class="hist-empty">No se pudo cargar el historial. Verifica tu conexión e inténtalo de nuevo.</div>';
  }
}

function cerrarHistorial() {
  document.getElementById('hist-overlay').className = 'hist-overlay';
}

/* ================= BUSCADOR DE CLIENTES ================= */
function onClienteInput() {
  clienteElegido = null;
  const sel = document.getElementById('cli-selected');
  sel.className = 'cli-selected';
  const texto = document.getElementById('cliente').value;
  const q = normalizar(texto);
  const box = document.getElementById('cliente-results');
  const asesor = document.getElementById('asesor').value;

  if (!asesor) { box.className = 'cliente-results'; checkReady(); return; }
  if (q.length < 2) { box.className = 'cliente-results'; checkReady(); return; }

  const visitadosHoy = new Set(visitasHoy.map(v => normalizar(v.cliente)));
  const fuente = clientesAsesor.length ? clientesAsesor : baseClientes;
  const matches = fuente.filter(c => c.nombreNorm.includes(q)).slice(0, 15);

  if (!matches.length) {
    box.innerHTML = '<div class="cli-empty">No está en tu cartera — se registrará tal como lo escribas <b>(prospecto / cliente nuevo)</b>. Recuerda marcar el motivo "Prospección" si aplica.</div>';
    // Indicador permanente bajo el campo
    sel.innerHTML = '<i class="ti ti-user-search"></i> Cliente nuevo o prospecto (no está en tu cartera)';
    sel.className = 'cli-selected prospecto show';
  } else {
    box.innerHTML = matches.map((c, i) => {
      const tags = [];
      if (!c.activo) tags.push('<span class="cli-tag inactivo">inactivo</span>');
      if (visitadosHoy.has(c.nombreNorm)) tags.push('<span class="cli-tag visitado">visitado hoy</span>');
      return '<div class="cli-item" onmousedown="elegirCliente(' + i + ')">' +
        '<div class="cli-name">' + escapeHtml(c.nombre) + '</div>' +
        '<div class="cli-meta"><span>' + escapeHtml(c.ciudad) + '</span>' + tags.join('') + '</div></div>';
    }).join('');
    box._matches = matches;
  }
  box.className = 'cliente-results show';
  checkReady();
}

function elegirCliente(i) {
  const box = document.getElementById('cliente-results');
  const c = box._matches[i];
  clienteElegido = c;
  document.getElementById('cliente').value = c.nombre;
  box.className = 'cliente-results';
  const sel = document.getElementById('cli-selected');
  sel.innerHTML = '<i class="ti ti-circle-check"></i> Cliente de tu cartera · ' + escapeHtml(c.ciudad);
  sel.className = 'cli-selected show';
  checkReady();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.cliente-wrap')) {
    document.getElementById('cliente-results').className = 'cliente-results';
  }
});

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, m =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}

/* ================= GPS ================= */
function getLocation() {
  const btn  = document.getElementById('loc-btn');
  const txt  = document.getElementById('loc-text');
  const icon = document.getElementById('loc-icon');
  txt.textContent = 'Obteniendo ubicación...';
  icon.className  = 'ti ti-loader-2';
  btn.disabled    = true;

  if (!navigator.geolocation) {
    txt.textContent = 'GPS no disponible en este dispositivo';
    btn.className = 'loc-btn err'; btn.disabled = false; return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      const acc = Math.round(pos.coords.accuracy);
      locationData = { lat, lng, acc };
      txt.textContent = lat + ', ' + lng + ' (±' + acc + 'm)';
      btn.className   = 'loc-btn got';
      icon.className  = 'ti ti-circle-check';
      btn.disabled    = false;
      document.getElementById('map-container').style.display = 'block';
      document.getElementById('map-frame').src =
        'https://maps.google.com/maps?q=' + lat + ',' + lng + '&z=16&output=embed';
      checkReady();
    },
    () => {
      txt.textContent = 'No se pudo obtener ubicación. Verifica permisos GPS.';
      btn.className   = 'loc-btn err';
      icon.className  = 'ti ti-map-pin-off';
      btn.disabled    = false;
    },
    { enableHighAccuracy: true, timeout: 15000 }
  );
}

/* ================= VALIDACIÓN Y ENVÍO ================= */
function checkReady() {
  const faltan = [];
  if (!document.getElementById('asesor').value)          faltan.push('asesor');
  if (!document.getElementById('cliente').value.trim())  faltan.push('cliente');
  if (!document.getElementById('km').value)              faltan.push('kilometraje');
  if (!selectedMotivos.length)                           faltan.push('motivo de visita');
  if (!locationData)                                     faltan.push('ubicación GPS');

  document.getElementById('submit-btn').disabled = faltan.length > 0 || enviando;
  document.getElementById('submit-hint').textContent =
    faltan.length ? 'Falta: ' + faltan.join(', ') : '';
}

function esDuplicadoHoy(cliente) {
  const c = normalizar(cliente);
  return visitasHoy.find(v => normalizar(v.cliente) === c);
}

function closeDup(confirmar) {
  document.getElementById('dup-overlay').className = 'dup-overlay';
  if (confirmar) { dupConfirmado = true; submitForm(); }
}

async function submitForm() {
  const asesor  = document.getElementById('asesor').value;
  const cliente = document.getElementById('cliente').value.trim();
  const km      = document.getElementById('km').value;
  if (!asesor || !cliente || !km || !selectedMotivos.length || !locationData || enviando) return;

  // Aviso si el cliente ya fue visitado hoy (evita el doble registro)
  if (!dupConfirmado) {
    const dup = esDuplicadoHoy(cliente);
    if (dup) {
      document.getElementById('dup-msg').textContent =
        'Ya registraste una visita a "' + cliente + '" hoy' +
        (dup.hora ? ' a las ' + dup.hora : '') +
        '. ¿Seguro que quieres registrar otra visita al mismo cliente?';
      document.getElementById('dup-overlay').className = 'dup-overlay show';
      return;
    }
  }
  dupConfirmado = false;

  enviando = true;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" style="font-size:18px"></i> Guardando...';

  const now = new Date();
  const payload = {
    action:  'insert',
    id:      Date.now(),
    asesor,
    cliente,
    km:      parseInt(km),
    motivo:  selectedMotivos.join(', '),
    lat:     locationData.lat,
    lng:     locationData.lng,
    acc:     locationData.acc,
    fecha:   now.toISOString().split('T')[0],
    hora:    now.toTimeString().slice(0, 5)
  };

  try {
    const res = await api(payload);

    if (res.ok) {
      if (res.dup) {
        showToast('Esta visita ya estaba registrada (no se duplicó)', true);
      } else {
        showToast('✓ Registrada: ' + cliente, false);
      }
      resetForm();
      loadToday(); // actualiza el contador del día
    } else {
      throw new Error(res.error || 'Error desconocido');
    }
  } catch(e) {
    // SIN SEÑAL: la visita NO se pierde — queda en el teléfono y se envía sola
    const cola = getPendientes();
    cola.push(payload);
    setPendientes(cola);
    visitasHoy.push({ cliente: payload.cliente, hora: payload.hora, motivo: payload.motivo });
    document.getElementById('today-count').textContent = visitasHoy.length;
    renderTodayList();
    showToast('Sin señal: visita guardada en tu teléfono, se enviará sola', true);
    resetForm();
  }
  enviando = false;
  checkReady();
}

function resetForm() {
  document.getElementById('cliente').value = '';
  document.getElementById('km').value      = '';
  clienteElegido = null;
  document.getElementById('cli-selected').className = 'cli-selected';
  selectedMotivos = []; locationData = null;
  updateMotivoButtons();
  document.getElementById('loc-btn').className    = 'loc-btn';
  document.getElementById('loc-icon').className   = 'ti ti-current-location';
  document.getElementById('loc-text').textContent = 'Toca para obtener tu ubicación actual';
  document.getElementById('map-container').style.display = 'none';
  document.getElementById('submit-btn').disabled  = true;
  document.getElementById('submit-btn').innerHTML =
    '<i class="ti ti-circle-check" style="font-size:18px"></i> Registrar visita';
  document.getElementById('submit-hint').textContent = '';
  // Se mantiene el asesor seleccionado para registrar la siguiente visita más rápido
}

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isErr ? ' err' : '') + ' show';
  setTimeout(() => { t.className = 'toast' + (isErr ? ' err' : ''); }, 2800);
}

cargarBase();
renderPendientes();
if (navigator.onLine) enviarPendientes(false);
</script>
